# Lancer en local : docker compose up -d
# Backend : cd backend && npm run dev (connexion à Postgres sur localhost:5432)
# Frontend : cd frontend && npm run dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: social-network-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: social-network-db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d social-network-db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
