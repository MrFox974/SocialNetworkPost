name: Deploy backend to AWS Lambda

on:
  # Déploiement auto quand le backend change sur main
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
  # Permet d'appeler ce workflow depuis un autre workflow (reusable workflow)
  workflow_call:
  # Permet de le lancer manuellement depuis l'onglet Actions
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install Serverless CLI
        run: npm install -g serverless@3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::616421593714:role/official_github_deploy
          aws-region: eu-west-3

      - name: Deploy with Serverless
        env:
          # Secrets (sensibles) - à créer dans Settings > Secrets and variables > Actions
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          # Vars (non sensibles) - à créer dans Settings > Variables (vars)
          PROTOCOLE: ${{ vars.PROTOCOLE }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          CLIENT_IP: ${{ vars.CLIENT_IP }}
          CLIENT_PORT: ${{ vars.CLIENT_PORT }}
          SERVER_PORT: ${{ vars.SERVER_PORT }}
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          PRODUCTION: ${{ vars.PRODUCTION }}
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
          APPLE_CLIENT_ID: ${{ vars.APPLE_CLIENT_ID }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
        
        run: npx serverless deploy

