name: Deploy backend to AWS Lambda

on:
  # Déploiement auto quand le backend change sur main
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
  # Permet d'appeler ce workflow depuis un autre workflow (reusable workflow)
  workflow_call:
  # Permet de le lancer manuellement depuis l'onglet Actions
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install Serverless CLI
        run: npm install -g serverless@3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::616421593714:role/official_github_deploy
          aws-region: eu-west-3

      - name: Deploy with Serverless
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        
        run: npx serverless deploy

